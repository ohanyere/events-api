apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: events-api-alerts
  labels:
    app.kubernetes.io/name: events-api
    release: prometheus
spec:
  groups:
    - name: events-api.availability
      rules:
        - alert: events-apiHighErrorRate
          expr: sum(rate(http_requests_total{service="events-api",status=~"5.."}[5m])) / sum(rate(http_requests_total{service="events-api"}[5m])) > 0.05
          for: 10m
          labels:
            severity: warning
            team: Platform Engineering
          annotations:
            summary: events-api has elevated 5xx responses.
            runbook_url: docs/RUNBOOK.md
        - alert: events-apiUnavailable
          expr: up{job="events-api"} == 0
          for: 5m
          labels:
            severity: critical
            team: Platform Engineering
          annotations:
            summary: events-api is not being scraped or is unavailable.
            runbook_url: docs/RUNBOOK.md
