apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: events-api
  labels:
    app.kubernetes.io/name: events-api
    release: prometheus
    finops.ohanyere.io/cost-center: platform-engineering
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: events-api
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
